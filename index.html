<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Physics shootout: Yang Cup '26</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Teko:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" id="MathJax-script" async></script>
    <style>
        :root {
            --ea-gold: #f5a623;
            --ea-neon-blue: #00e5ff;
            --ea-emerald: #00ff66;
            --ea-crimson: #ff0055;
            --stadium-dark: #070b19;
            --hud-bg: rgba(9, 14, 34, 0.85);
            --crt-glow: rgba(0, 229, 255, 0.03);
        }

        body {
            font-family: 'Orbitron', sans-serif;
            background: var(--stadium-dark);
            background-image: radial-gradient(circle at center, #111a36 0%, #050814 100%);
            color: #ffffff;
            margin: 0;
            padding: 20px;
            user-select: none;
            overflow-x: hidden;
        }

        .crt-container {
            position: relative;
            max-width: 980px;
            margin: 0 auto;
            border: 6px solid #2d384e;
            border-radius: 16px;
            background: #000;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.8), inset 0 0 100px rgba(0, 229, 255, 0.2);
            overflow: hidden;
        }

        .crt-container::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        .stadium-wrapper {
            padding: 25px;
            background: linear-gradient(135deg, #0a1128 0%, #030611 100%);
            position: relative;
        }

        .broadcast-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(90deg, #162447 0%, #1f4068 50%, #162447 100%);
            border-bottom: 4px solid var(--ea-gold);
            padding: 12px 25px;
            border-radius: 6px 6px 0 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .broadcast-logo {
            font-family: 'Teko', sans-serif;
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 3px 3px 0px var(--ea-crimson);
            margin: 0;
        }

        .live-ticker-badge {
            background: var(--ea-crimson);
            color: #fff;
            padding: 4px 14px;
            font-size: 12px;
            font-weight: 900;
            border-radius: 4px;
            letter-spacing: 2px;
            box-shadow: 0 0 10px var(--ea-crimson);
            animation: broadcastPulse 1.8s infinite;
        }

        @keyframes broadcastPulse {
            0% { opacity: 0.7; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1.02); }
            100% { opacity: 0.7; transform: scale(0.98); }
        }

        .screen { display: none; }
        .active { display: block !important; }

        .ea-card {
            background: var(--hud-bg);
            border: 2px solid #1f4068;
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        label {
            font-size: 12px;
            color: var(--ea-neon-blue);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
        }

        select, input[type="text"] {
            width: 100%;
            box-sizing: border-box;
            background: #0b132b;
            border: 2px solid #1c2d5a;
            color: #fff;
            padding: 12px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 15px;
            border-radius: 6px;
            margin-bottom: 16px;
            transition: all 0.3s;
        }

        select:focus, input[type="text"]:focus {
            border-color: var(--ea-gold);
            box-shadow: 0 0 10px rgba(245, 166, 35, 0.3);
            outline: none;
        }

        .cloud-sync-status-bar {
            background: rgba(0, 229, 255, 0.08);
            border: 1px solid var(--ea-neon-blue);
            padding: 15px 20px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Share Tech Mono', monospace;
        }

        .btn-refresh-sheets {
            background: #1f4068;
            border: 1px solid var(--ea-neon-blue);
            color: #fff;
            padding: 6px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .btn-refresh-sheets:hover {
            background: var(--ea-neon-blue);
            color: var(--stadium-dark);
            box-shadow: 0 0 10px var(--ea-neon-blue);
        }

        .btn-action {
            background: linear-gradient(135deg, var(--ea-gold) 0%, #e08b00 100%);
            color: #000;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 18px;
            padding: 16px 32px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 6px 20px rgba(245, 166, 35, 0.4);
            width: 100%;
            transition: all 0.2s;
        }

        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(245, 166, 35, 0.6);
            background: linear-gradient(135deg, #ffb633 0%, var(--ea-gold) 100%);
        }

        .stadium-hud-scoreboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(180deg, #111a36 0%, #090e22 100%);
            border: 2px solid #223461;
            border-top: 4px solid var(--ea-neon-blue);
            padding: 15px 25px;
            margin-bottom: 15px;
            border-radius: 6px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .team-hud-profile {
            display: flex;
            flex-direction: column;
        }

        .team-hud-title {
            font-family: 'Teko', sans-serif;
            font-size: 26px;
            letter-spacing: 1.5px;
            color: #ffffff;
            text-transform: uppercase;
        }

        .shot-matrix-row {
            display: flex;
            gap: 6px;
            margin-top: 6px;
        }

        .matrix-node {
            width: 16px;
            height: 16px;
            border: 2px solid #1c2d5a;
            background: #0b132b;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .matrix-node.scored {
            background: var(--ea-emerald);
            border-color: #fff;
            box-shadow: 0 0 10px var(--ea-emerald);
        }

        .matrix-node.missed {
            background: var(--ea-crimson);
            border-color: #fff;
            box-shadow: 0 0 10px var(--ea-crimson);
        }

        .matrix-node.current-pulse {
            border-color: var(--ea-gold);
            background: #111a36;
            box-shadow: 0 0 8px var(--ea-gold);
            animation: targetPulse 1s infinite alternate;
        }

        .score-center-digits {
            font-family: 'Teko', sans-serif;
            font-size: 44px;
            font-weight: 700;
            background: #000;
            color: var(--ea-gold);
            padding: 0px 24px;
            border-radius: 6px;
            border: 2px solid #1c2d5a;
            letter-spacing: 2px;
        }

        .ticker-wrapper {
            background: #000;
            padding: 8px;
            overflow: hidden;
            white-space: nowrap;
            border-radius: 4px;
            margin-bottom: 15px;
            border: 1px solid #1c2d5a;
        }

        .ticker-content {
            display: inline-block;
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px;
            color: var(--ea-neon-blue);
            animation: scrollTicker 28s linear infinite;
        }

        @keyframes scrollTicker {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .quiz-overlay-box {
            background: rgba(5, 9, 26, 0.96);
            border: 3px solid var(--ea-gold);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        .quiz-meta-header {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 12px;
            color: #a0aec0;
            border-bottom: 1px solid #1c2d5a;
            padding-bottom: 6px;
        }

        .quiz-question-box {
            font-size: 17px;
            line-height: 1.6;
            margin-bottom: 20px;
            font-weight: 700;
            color: #fff;
        }

        .options-grid-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .quiz-option-node {
            background: #111a36;
            border: 2px solid #1c2d5a;
            color: #fff;
            padding: 14px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 15px;
            text-align: left;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .quiz-option-node:hover {
            background: #1c2d5a;
            border-color: var(--ea-neon-blue);
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
        }

        #timer-progress-track {
            width: 100%;
            height: 8px;
            background: #090e22;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 15px;
            border: 1px solid #1c2d5a;
        }

        #timer-progress-fill {
            width: 100%;
            height: 100%;
            background: var(--ea-emerald);
            transition: width 0.1s linear;
        }

        #stadium-canvas-wrap {
            position: relative;
            width: 880px;
            height: 460px;
            margin: 0 auto;
            border: 4px solid #1c2d5a;
            border-radius: 8px;
            box-shadow: 0 12px 36px rgba(0,0,0,0.6);
            background: #133a1b;
        }

        canvas { display: block; image-rendering: pixelated; }

        .btn-reset-nav {
            background: transparent;
            border: 2px solid var(--ea-crimson);
            color: var(--ea-crimson);
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 11px;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
            display: none;
        }

        .btn-reset-nav:hover {
            background: var(--ea-crimson);
            color: #fff;
            box-shadow: 0 0 10px var(--ea-crimson);
        }

        .system-footer-logger {
            margin-top: 15px;
            background: #040712;
            padding: 12px 20px;
            border-radius: 6px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            color: #53647c;
            border-left: 4px solid #1f4068;
        }
    </style>
</head>
<body>

    <div class="crt-container">
        <div class="broadcast-bar">
            <div class="broadcast-logo">EA SPORTS NET Live '96</div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <button class="btn-reset-nav" id="global-reset-btn" onclick="abortMatchAndResetSystem()">↺ Quit Match</button>
                <div class="live-ticker-badge">● TELECAST FEED</div>
            </div>
        </div>

        <div class="stadium-wrapper">
            
            <div id="screen-setup" class="screen active">
                <div class="cloud-sync-status-bar">
                    <div>📡 <span id="sync-status-indicator" style="color: var(--ea-neon-blue); font-weight: bold;">Connecting to Question Matrix Server...</span></div>
                    <button class="btn-refresh-sheets" onclick="fetchGoogleWorksheetsListing()">🔄 Reload Workbook</button>
                </div>

                <div class="ea-card">
                    <label>Select Physics Match Target (Worksheet Tab)</label>
                    <select id="bank-selector-dropdown" onchange="pullActiveSheetQuestionsData()">
                        <option>Querying cloud storage configurations...</option>
                    </select>

                    <label style="margin-top: 20px;">Match Telecast Configuration Framework</label>
                    <select id="match-mode-select" onchange="adaptRosterInputs()">
                        <option value="solo_striker">1-PLAYER: STRIKER MODE (Answer to Shoot, CPU Defends Goal)</option>
                        <option value="solo_goalie">1-PLAYER: GOALKEEPER MODE (CPU Shoots, Answer to Dive/Save)</option>
                        <option value="versus">2-PLAYER: RETRO HEAD-TO-HEAD COMPILATION</option>
                    </select>

                    <div id="roster-names-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div>
                            <label id="lbl-p1">Striker Operator Name</label>
                            <input type="text" id="name-p1-input" value="STRIKER P1" maxlength="12">
                        </div>
                        <div>
                            <label id="lbl-p2">Goalkeeper System Deck</label>
                            <input type="text" id="name-p2-input" value="KEEPER CPU" disabled maxlength="12">
                        </div>
                    </div>
                </div>

                <button class="btn-action" onclick="launchTelevisedMatchArena()">Enter Stadium Arena</button>
            </div>

            <div id="screen-match" class="screen">
                <div class="stadium-hud-scoreboard">
                    <div class="team-hud-profile">
                        <div class="team-hud-title" id="hud-p1-name">TEAM A</div>
                        <div class="shot-matrix-row" id="hud-p1-trackers"></div>
                    </div>
                    <div class="score-center-digits" id="hud-score-digits">00 - 00</div>
                    <div class="team-hud-profile" style="align-items: flex-end;">
                        <div class="team-hud-title" id="hud-p2-name">TEAM B</div>
                        <div class="shot-matrix-row" id="hud-p2-trackers" style="justify-content: flex-end;"></div>
                    </div>
                </div>

                <div class="ticker-wrapper">
                    <div class="ticker-content" id="live-news-ticker">ESTABLISHING SATELLITE LINKS...</div>
                </div>

                <div class="quiz-overlay-box" id="quiz-overlay-panel" style="display: none;">
                    <div class="quiz-meta-header">
                        <span id="quiz-role-header" style="font-weight: 900; letter-spacing: 1px;">METRIC PACKET DECK</span>
                        <span id="quiz-mechanic-warning" style="color: var(--ea-gold); font-weight: bold;">COMPUTATION TIME RECTIFIER</span>
                    </div>
                    <div class="quiz-question-box" id="quiz-question-text">Syncing formula structures...</div>
                    <div class="options-grid-layout" id="tv-options-grid"></div>
                    <div id="timer-progress-track"><div id="timer-progress-fill"></div></div>
                </div>

                <div id="stadium-canvas-wrap">
                    <canvas id="stadiumCanvas" width="880" height="460"></canvas>
                </div>
            </div>

            <div id="screen-summary" class="screen" style="text-align: center; padding: 40px 10px;">
                <h1 id="trophy-headline" style="font-family: 'Teko', sans-serif; font-size: 54px; color: var(--ea-gold); margin-bottom: 10px; text-shadow: 3px 3px 0 #000;">MATCH CONCLUDED</h1>
                <div class="ea-card" id="post-match-stats" style="font-family: 'Share Tech Mono', monospace; font-size: 16px; line-height: 2; text-align: center;"></div>
                <button class="btn-action" onclick="abortMatchAndResetSystem()">Return to Main Menu</button>
            </div>

            <div class="system-footer-logger" id="system-status-log">
                CORE SYSTEM: INITIALIZING GRAPHICS HARDWARE DECK...
            </div>
        </div>
    </div>

    <script>
        // =========================================================================
        // 🛠️ GOOGLE SHEETS DEPLOYMENT ROUTER
        // =========================================================================
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxYH1g1RvbLXl0Kmg7T8sEDDnyFUKANqQEzElp90hdsIz1RInoP4v_NYIZTamaCwBZgOw/exec";

        const AudioContextEngine = window.AudioContext || window.webkitAudioContext;
        let soundCardCtx = null;
        let ambientGainNode = null;
        let dynamicCrowdFilter = null;

        function awakeAudioSystems() {
            if (!soundCardCtx) {
                soundCardCtx = new AudioContextEngine();
                spinCrowdAtmosphereLoop();
            }
            if (soundCardCtx.state === 'suspended') soundCardCtx.resume();
        }

        function spinCrowdAtmosphereLoop() {
            let bufferLen = soundCardCtx.sampleRate * 2.5;
            let buffer = soundCardCtx.createBuffer(1, bufferLen, soundCardCtx.sampleRate);
            let rawData = buffer.getChannelData(0);
            for (let i = 0; i < bufferLen; i++) { rawData[i] = Math.random() * 2 - 1; }
            
            let src = soundCardCtx.createBufferSource();
            src.buffer = buffer; src.loop = true;

            dynamicCrowdFilter = soundCardCtx.createBiquadFilter();
            dynamicCrowdFilter.type = 'lowpass'; 
            dynamicCrowdFilter.frequency.setValueAtTime(350, soundCardCtx.currentTime);

            ambientGainNode = soundCardCtx.createGain();
            ambientGainNode.gain.setValueAtTime(0.06, soundCardCtx.currentTime);

            src.connect(dynamicCrowdFilter); 
            dynamicCrowdFilter.connect(ambientGainNode); 
            ambientGainNode.connect(soundCardCtx.destination);
            src.start();
        }

        function playRetroSoundFx(blueprint) {
            try {
                awakeAudioSystems();
                let timeline = soundCardCtx.currentTime;

                if (blueprint === 'whistle') {
                    let osc1 = soundCardCtx.createOscillator(); let osc2 = soundCardCtx.createOscillator();
                    let g = soundCardCtx.createGain();
                    osc1.frequency.setValueAtTime(1800, timeline); osc2.frequency.setValueAtTime(1815, timeline);
                    g.gain.setValueAtTime(0, timeline);
                    g.gain.linearRampToValueAtTime(0.25, timeline + 0.02);
                    g.gain.setValueAtTime(0.25, timeline + 0.4);
                    g.gain.exponentialRampToValueAtTime(0.001, timeline + 0.5);
                    osc1.connect(g); osc2.connect(g); g.connect(soundCardCtx.destination);
                    osc1.start(timeline); osc2.start(timeline);
                    osc1.stop(timeline + 0.5); osc2.stop(timeline + 0.5);
                } 
                else if (blueprint === 'goal') {
                    if (ambientGainNode && dynamicCrowdFilter) {
                        ambientGainNode.gain.cancelScheduledValues(timeline);
                        dynamicCrowdFilter.frequency.cancelScheduledValues(timeline);
                        
                        dynamicCrowdFilter.frequency.linearRampToValueAtTime(900, timeline + 0.05);
                        ambientGainNode.gain.setValueAtTime(0.06, timeline);
                        ambientGainNode.gain.linearRampToValueAtTime(0.5, timeline + 0.05);
                        ambientGainNode.gain.linearRampToValueAtTime(0.3, timeline + 1.5);
                        ambientGainNode.gain.exponentialRampToValueAtTime(0.06, timeline + 3.5);
                        dynamicCrowdFilter.frequency.exponentialRampToValueAtTime(350, timeline + 3.5);
                    }
                } 
                else if (blueprint === 'boo') {
                    if (ambientGainNode && dynamicCrowdFilter) {
                        ambientGainNode.gain.cancelScheduledValues(timeline);
                        dynamicCrowdFilter.frequency.cancelScheduledValues(timeline);
                        
                        dynamicCrowdFilter.frequency.linearRampToValueAtTime(220, timeline + 0.1);
                        ambientGainNode.gain.setValueAtTime(0.06, timeline);
                        ambientGainNode.gain.linearRampToValueAtTime(0.4, timeline + 0.1);
                        ambientGainNode.gain.linearRampToValueAtTime(0.2, timeline + 1.2);
                        ambientGainNode.gain.exponentialRampToValueAtTime(0.06, timeline + 3.0);
                        dynamicCrowdFilter.frequency.exponentialRampToValueAtTime(350, timeline + 3.0);
                    }
                }
                else if (blueprint === 'click') {
                    let osc = soundCardCtx.createOscillator(); let g = soundCardCtx.createGain();
                    osc.frequency.setValueAtTime(800, timeline); g.gain.setValueAtTime(0.05, timeline);
                    g.gain.exponentialRampToValueAtTime(0.001, timeline + 0.05);
                    osc.connect(g); g.connect(soundCardCtx.destination);
                    osc.start(timeline); osc.stop(timeline + 0.05);
                }
            } catch(err) {}
        }

        let activeQuestionBank = [
            {q: "Grid framework safety mapping: Velocity equals?", ans: ["Displacement / Time", "Acceleration x Mass", "Work / Power", "Force x Vector"], correct: 0}
        ];

        function fetchGoogleWorksheetsListing() {
            document.getElementById('sync-status-indicator').innerText = "Scanning workbook tabs schema...";
            document.getElementById('system-status-log').innerText = "SYSTEM HARDWARE: Directing data requests to cloud API...";

            fetch(`${APPS_SCRIPT_URL}?action=getSheets`, { method: 'GET', mode: 'cors' })
                .then(res => res.json())
                .then(json => {
                    if (json.sheets && json.sheets.length > 0) {
                        const menu = document.getElementById('bank-selector-dropdown');
                        menu.innerHTML = '';
                        json.sheets.forEach(tab => {
                            let item = document.createElement('option');
                            item.value = tab; item.innerText = `⚽ COMPILATION: ${tab}`;
                            menu.appendChild(item);
                        });
                        document.getElementById('sync-status-indicator').innerText = `✅ Connected! Processed ${json.sheets.length} data streams.`;
                        document.getElementById('system-status-log').innerText = "SYSTEM HARDWARE: Sheet workbook connection stable.";
                        pullActiveSheetQuestionsData();
                    }
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('sync-status-indicator').innerText = "❌ Pipeline Timeout. Verify access rights.";
                });
        }

        function pullActiveSheetQuestionsData() {
            let selectedTab = document.getElementById('bank-selector-dropdown').value;
            if (!selectedTab) return;

            document.getElementById('system-status-log').innerText = `SYSTEM HARDWARE: Synchronizing rows from tab: "${selectedTab}"...`;

            fetch(`${APPS_SCRIPT_URL}?action=getSheetData&sheetName=${encodeURIComponent(selectedTab)}`, { method: 'GET', mode: 'cors' })
                .then(res => res.json())
                .then(json => {
                    if (json.data && json.data.length > 1) {
                        let parsed = [];
                        for (let i = 0; i < json.data.length; i++) {
                            let row = json.data[i];
                            if (!row || row.length < 7) continue;

                            let qText = row[1] ? String(row[1]).trim() : "";
                            if (!qText || qText.toLowerCase().includes('question text') || qText.toLowerCase().includes('blooket')) continue;

                            let choices = [];
                            if (row[2] !== undefined && row[2] !== "") choices.push(String(row[2]).trim());
                            if (row[3] !== undefined && row[3] !== "") choices.push(String(row[3]).trim());
                            if (row[4] !== undefined && row[4] !== "") choices.push(String(row[4]).trim());
                            if (row[5] !== undefined && row[5] !== "") choices.push(String(row[5]).trim());

                            let correctCol = parseInt(row[7]);
                            if (isNaN(correctCol) && row[6] !== undefined) correctCol = parseInt(row[6]);
                            let corrIdx = isNaN(correctCol) ? 0 : correctCol - 1;
                            if (corrIdx < 0 || corrIdx >= choices.length) corrIdx = 0;

                            if (choices.length > 0 && qText.length > 0) {
                                parsed.push({ q: qText, ans: choices, correct: corrIdx });
                            }
                        }

                        if (parsed.length > 0) {
                            activeQuestionBank = parsed;

        function executeCpuAutomatedShooterTurn() {

        function executeCpuAutomatedGoalieTurn() {
            let totalOptions = shooterSpeedRatio < 6 ? 2 : (shooterSpeedRatio < 12 ? 5 : 8);
            let deck = [...targetGridSectors]; let choices = [];
            let real = targetGridSectors.find(s => s.id === shooterSelectedSector.id);
            choices.push(real);
            deck = deck.filter(s => s.id !== shooterSelectedSector.id);

            for (let i = 0; i < (totalOptions - 1); i++) {
                if (deck.length > 0) choices.push(deck.splice(Math.floor(Math.random() * deck.length), 1)[0]);

                goalkeeperVisibleOptionPool.push(matchBox);
                pool = pool.filter(s => s.id !== shooterSelectedSector.id);

                for (let i = 0; i < (count - 1); i++) {

        function getSectorFromCoordinates(mx, my) {
            for (let s of targetGridSectors) {
                if (mx >= s.x && mx <= s.x + s.w && my >= s.y && my <= s.y + s.h) return s;
            }
            return null;
        }

        function computeHoverGridCoords(e) {
            if (broadcastLoopState !== 'aim_striker' && broadcastLoopState !== 'aim_goalie') return;
            const b = canvas.getBoundingClientRect();
            const mx = e.clientX - b.left; const my = e.clientY - b.top;
            let m = getSectorFromCoordinates(mx, my);
            if (m) {
                if (broadcastLoopState === 'aim_striker' && m.isLockedRed) { currentlyHoveredSector = null; return; }
                if (broadcastLoopState === 'aim_goalie' && goalkeeperVisibleOptionPool.length > 0 && !goalkeeperVisibleOptionPool.includes(m)) { currentlyHoveredSector = null; return; }
                currentlyHoveredSector = m;
            } else { currentlyHoveredSector = null; }
        }

        function registerGridZoneClick(e) {
            if (broadcastLoopState !== 'aim_striker' && broadcastLoopState !== 'aim_goalie') return;
            const b = canvas.getBoundingClientRect();
            const mx = e.clientX - b.left; const my = e.clientY - b.top;
            let targetBox = getSectorFromCoordinates(mx, my);
            if (targetBox) {
                if (broadcastLoopState === 'aim_striker' && targetBox.isLockedRed) return;
                if (broadcastLoopState === 'aim_goalie' && goalkeeperVisibleOptionPool.length > 0 && !goalkeeperVisibleOptionPool.includes(targetBox)) return;
                executeTargetSelectionBinding(targetBox);
            }

            if (box) {
                if (broadcastLoopState === 'aim_striker' && box.isLockedRed) return;
                if (broadcastLoopState === 'aim_goalie' && goalkeeperVisibleOptionPool.length > 0 && !goalkeeperVisibleOptionPool.includes(box)) return;
                executeTargetSelectionBinding(box);

        let shotOutcomeMeta = { status: 'GOAL', description: 'GOAL!', analysis: '' };

        function initiateMechanicalBallAnimation() {
            broadcastLoopState = 'kick_runup';
            assetsBall.tx = shooterSelectedSector.x + (boxW / 2); assetsBall.ty = shooterSelectedSector.y + (boxH / 2);

            let blocked = (shooterSelectedSector.id === goalieSelectedSector.id);
            assetsGoalie.pose = (goalieSelectedSector.col < 2) ? 'dive_left' : 'dive_right';

            if (blocked) {
                crowdMood = 'boo';
                shotOutcomeMeta = { status: 'SAVE', description: getRandomCliche(clichesSave), analysis: 'Hit it cleanly, but the keeper simply wanted it more.' };
            } else {
                if (shooterAnsweredCorrect) {
                    crowdMood = 'cheer';
                    shotOutcomeMeta = { status: 'GOAL', description: getRandomCliche(clichesGoal), analysis: 'Left the keeper with absolutely no chance. Pure geometry.' };

                    if (Math.random() < 0.45) {
                        assetsBall.tx = (Math.random() < 0.5) ? netConfig.leftX - 50 : netConfig.rightX + 50;
                        crowdMood = 'boo';
                        shotOutcomeMeta = { status: 'WIDE', description: getRandomCliche(clichesMiss), analysis: 'Looked completely unbalanced as he struck that vector.' };
                    } else {
                        crowdMood = 'cheer';
                        shotOutcomeMeta = { status: 'GOAL', description: getRandomCliche(clichesGoal), analysis: 'Deflected off the post structure, completely doing the keeper.' };
                    }
                }
            }
        }

        function calculateTurnRegistryState() {
            let goal = (shotOutcomeMeta.status === 'GOAL');
            let key = (turnIndex === 0) ? 'p1' : 'p2';

            matchScores[key].tracking.push(goal);
            if (goal) matchScores[key].goals++;
            matchScores[key].attempts++;

            let s1 = matchScores.p1; let s2 = matchScores.p2;

            if (!isSuddenDeathPhase) {
                if (s1.goals > s2.goals + Math.max(0, 5 - s2.attempts)) { triggerMatchConclusion('p1'); return; }
                if (s2.goals > s1.goals + Math.max(0, 5 - s1.attempts)) { triggerMatchConclusion('p2'); return; }
                if (s1.attempts >= 5 && s2.attempts >= 5) {
                    if (s1.goals === s2.goals) { isSuddenDeathPhase = true; setTickerTapeMessage("⚡ SUDDEN DEATH! Next mistake is terminal!"); }
                    else { triggerMatchConclusion(s1.goals > s2.goals ? 'p1' : 'p2'); return; }
                }
            } else {
                if (s1.attempts === s2.attempts && s1.goals !== s2.goals) { triggerMatchConclusion(s1.goals > s2.goals ? 'p1' : 'p2'); return; }
            }

            turnIndex = (turnIndex + 1) % 2;
            if (turnIndex === 0) globalRound++;
            refreshScoreBannerLayout(); initiateNextTurnSequence();
        }

        function triggerMatchConclusion(winner) {
            broadcastLoopState = 'none'; document.getElementById('global-reset-btn').style.display = 'none';

        function refreshScoreBannerLayout() {
            const b1 = document.getElementById('hud-p1-trackers'); const b2 = document.getElementById('hud-p2-trackers');
            b1.innerHTML = ''; b2.innerHTML = '';
            let total = Math.max(5, matchScores.p1.attempts, matchScores.p2.attempts);

                let d1 = makeHUDDotNode(matchScores.p1.tracking[i]);

                if (turnIndex === 0 && i === matchScores.p1.attempts && broadcastLoopState !== 'play_replay') d1.classList.add('current-pulse');
                if (turnIndex === 1 && i === matchScores.p2.attempts && broadcastLoopState !== 'play_replay') d2.classList.add('current-pulse');

        function makeHUDDotNode(stat) {
            let d = document.createElement('div'); d.className = 'matrix-node';

            return d;

        // =========================================================================
        // 🎮 FIFA 96 CANVAS GRAPHICS ENGINE (UPDATED RENDERING STACK)
        // =========================================================================
        function renderCorePipelineFrame() {
            crowdTimer += 0.15;
            if (screenFlashFrames > 0) screenFlashFrames--;
            if (cameraShakeIntensity > 0) cameraShakeIntensity -= 0.4;

            if (broadcastLoopState === 'whistle_wait') { countdownClock -= 0.4; if (countdownClock <= 0) processNextQuizTrigger(); }

            // Dynamic background crowd intensity adjustment
            if (soundCardCtx && ambientGainNode && dynamicCrowdFilter) {
                let timeline = soundCardCtx.currentTime;
                if (['kick_runup', 'ball_in_motion'].includes(broadcastLoopState)) {
                    dynamicCrowdFilter.frequency.setValueAtTime(550, timeline);
                    ambientGainNode.gain.setValueAtTime(0.18, timeline);
                }
            }

            if (broadcastLoopState === 'kick_runup') {
                assetsStriker.frame += 0.4;
                let targetStrikerX = 435; let targetStrikerY = 365;
                if (Math.hypot(targetStrikerX - assetsStriker.x, targetStrikerY - assetsStriker.y) > 6) {
                    assetsStriker.x += (targetStrikerX - assetsStriker.x) * 0.18;
                    assetsStriker.y += (targetStrikerY - assetsStriker.y) * 0.18;
                } else {
                    broadcastLoopState = 'ball_in_motion';
                    if (shotOutcomeMeta.status === 'GOAL') {
                        cameraShakeIntensity = 15; screenFlashFrames = 5; playRetroSoundFx('goal');
                        deployConfettiBurst(assetsBall.tx, assetsBall.ty);
                    } else { 
                        playRetroSoundFx('boo'); 
                    }
                }
            }

            if (broadcastLoopState === 'ball_in_motion') {
                assetsBall.x += (assetsBall.tx - assetsBall.x) * 0.11;
                assetsBall.y += (assetsBall.ty - assetsBall.y) * 0.11;
                assetsBall.shadowY += (netConfig.bottomY - assetsBall.shadowY) * 0.11;
                if (assetsBall.radius > 6) assetsBall.radius -= 0.14;

                let initialPath = Math.abs(350 - assetsBall.ty);
                let currentPath = Math.abs(assetsBall.y - assetsBall.ty);
                assetsBall.altY = Math.sin((currentPath / initialPath) * Math.PI) * 75;

                let gkGoalX = goalieSelectedSector.x + (boxW / 2);
                let gkGoalY = netConfig.topY + (goalieSelectedSector.row * boxH) + 30;
                assetsGoalie.x += (gkGoalX - assetsGoalie.x) * 0.14;
                assetsGoalie.y += (gkGoalY - assetsGoalie.y) * 0.14;

                if (assetsGoalie.limbExtension < 25) assetsGoalie.limbExtension += 2.5;
                assetsGoalie.armAngle = (assetsGoalie.pose === 'dive_left') ? -Math.PI / 4 : Math.PI / 4;

                if (Math.hypot(assetsBall.tx - assetsBall.x, assetsBall.ty - assetsBall.y) < 3) {
                    broadcastLoopState = 'play_replay';
                    setTickerTapeMessage(`REPLAY EXCLUSIVE: ${shotOutcomeMeta.description}`);
                    setTimeout(() => { calculateTurnRegistryState(); }, 3500);
                }
            }

            for (let i = dustConfettiPool.length - 1; i >= 0; i--) {
                let c = dustConfettiPool[i]; c.x += c.vx; c.y += c.vy; c.vy += 0.25; c.life--;
                if (c.life <= 0) dustConfettiPool.splice(i, 1);
            }

            ctx.save();
            if (cameraShakeIntensity > 0) ctx.translate((Math.random() - 0.5) * cameraShakeIntensity, (Math.random() - 0.5) * cameraShakeIntensity);

            // Ground base field texture
            ctx.fillStyle = '#184a23'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#1e5c2b';
            for (let y = 100; y < canvas.height; y += 40) {
                if ((y / 40) % 2 === 0) ctx.fillRect(0, y, canvas.width, 40);
            }

            // High texture grass blade noise simulation layer
            ctx.fillStyle = 'rgba(255, 255, 255, 0.03)';
            for (let i = 0; i < 400; i++) {
                let gx = (i * 73) % canvas.width;
                let gy = 100 + ((i * 37) % (canvas.height - 100));
                ctx.fillRect(gx, gy, 2, 4);
            }

            // Animated Retro Crowd Grandstand Layer (Behind Net Area)
            ctx.fillStyle = '#080d1a'; ctx.fillRect(0, 0, canvas.width, 105);
            ctx.fillStyle = '#1c263d';
            for (let r = 0; r < 5; r++) {
                ctx.fillRect(0, r * 16, canvas.width, 4);
            }
            
            // Pixelated multi-colored crowd spectators
            const colorsCrowd = ['#cc0000', '#0044cc', '#e6b800', '#ffffff', '#222222', '#666666'];
            for (let px = 10; px < canvas.width; px += 14) {
                for (let py = 12; py < 95; py += 16) {
                    let seed = (px * 3 + py * 7);
                    let idx = Math.abs(seed) % colorsCrowd.length;
                    ctx.fillStyle = colorsCrowd[idx];
                    
                    let bounce = 0;
                    if (crowdMood === 'cheer') {
                        bounce = Math.sin(crowdTimer + (px * 0.1)) * 6 - 3;
                    } else if (crowdMood === 'boo') {
                        bounce = (Math.floor(crowdTimer + px) % 3 === 0) ? 1 : -1;
                    } else {
                        bounce = Math.sin(crowdTimer * 0.2 + (px * 0.05)) * 1.5;
                    }
                    ctx.fillRect(px, py + bounce, 8, 10);
                }
            }

            // Pseudo-3D White Penalty Outer Bounds Box
            ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(60, 195); ctx.lineTo(820, 195); ctx.lineTo(880, 460); ctx.lineTo(0, 460); ctx.closePath(); ctx.stroke();

            // Puns Sponsorship Hoardings Layout Configuration Array
            const boards = [
                {x: 10, text: "WENGER'S SCHRÖDINGER CATS"},
                {x: 230, text: "A MATCH OF TWO HALFLIVES"},
                {x: 450, text: "100% RELATIVE VELOCITY FC"},
                {x: 670, text: "SUDDEN ENTROPY DEATH MATRIX"}
            ];
            boards.forEach(b => {
                ctx.fillStyle = '#0d1117'; ctx.fillRect(b.x, 92, 200, 13);
                ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1; ctx.strokeRect(b.x, 92, 200, 13);
                ctx.fillStyle = '#00ff66'; ctx.font = '900 9px "Share Tech Mono"'; ctx.textAlign = 'center';
                ctx.fillText(b.text, b.x + 100, 102);
            });

            // Goal Net Dark Backing Cavity Wall
            ctx.fillStyle = 'rgba(4, 10, 24, 0.92)'; ctx.fillRect(netConfig.leftX, netConfig.topY, netConfig.width, netConfig.height);

            // Woven Intersecting Cross-Latch Goal Net Meshing Structure
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)'; ctx.lineWidth = 1;
            for (let nx = netConfig.leftX; nx <= netConfig.rightX; nx += 12) {
                ctx.beginPath(); ctx.moveTo(nx, netConfig.topY); ctx.lineTo(nx, netConfig.bottomY); ctx.stroke();
            }
            for (let ny = netConfig.topY; ny <= netConfig.bottomY; ny += 10) {
                ctx.beginPath(); ctx.moveTo(netConfig.leftX, ny); ctx.lineTo(netConfig.rightX, ny); ctx.stroke();
            }

            targetGridSectors.forEach(sector => {
                let interactive = (broadcastLoopState === 'aim_striker' || broadcastLoopState === 'aim_goalie');
                
                if (sector.isLockedRed) {
                    ctx.fillStyle = 'rgba(255, 0, 85, 0.35)'; ctx.fillRect(sector.x, sector.y, sector.w, sector.h);
                    ctx.strokeStyle = varString('--ea-crimson', '#ff0055'); ctx.lineWidth = 2; ctx.strokeRect(sector.x, sector.y, sector.w, sector.h);
                } 
                else if (currentlyHoveredSector === sector && interactive) {
                    ctx.fillStyle = 'rgba(0, 229, 255, 0.35)'; ctx.fillRect(sector.x, sector.y, sector.w, sector.h);
                    ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 3; ctx.strokeRect(sector.x, sector.y, sector.w, sector.h);
                } 
                else if (broadcastLoopState === 'aim_goalie' && goalkeeperVisibleOptionPool.includes(sector)) {
                    ctx.fillStyle = 'rgba(245, 166, 35, 0.18)'; ctx.fillRect(sector.x, sector.y, sector.w, sector.h);
                    ctx.strokeStyle = varString('--ea-gold', '#f5a623'); ctx.lineWidth = 2; ctx.strokeRect(sector.x, sector.y, sector.w, sector.h);
                }
                else {
                    ctx.strokeStyle = 'rgba(0, 229, 255, 0.15)'; ctx.lineWidth = 1; ctx.strokeRect(sector.x, sector.y, sector.w, sector.h);
                }

                if (interactive) {
                    ctx.save();
                    ctx.shadowColor = '#000000'; ctx.shadowBlur = 6; ctx.shadowOffsetX = 2; ctx.shadowOffsetY = 2;
                    ctx.font = '900 24px "Orbitron"'; ctx.textBaseline = 'middle'; ctx.textAlign = 'center';

                    if (sector.isLockedRed) {
                        ctx.fillStyle = '#ff0055'; ctx.fillText('✕', sector.x + sector.w / 2, sector.y + sector.h / 2);
                    } else if (currentlyHoveredSector === sector) {
                        ctx.fillStyle = '#ffffff'; ctx.fillText(sector.letter, sector.x + sector.w / 2, sector.y + sector.h / 2);
                    } else if (broadcastLoopState === 'aim_goalie' && goalkeeperVisibleOptionPool.includes(sector)) {
                        ctx.fillStyle = 'var(--ea-gold)'; ctx.fillText(sector.letter, sector.x + sector.w / 2, sector.y + sector.h / 2);
                    } else {
                        ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.fillText(sector.letter, sector.x + sector.w / 2, sector.y + sector.h / 2);
                    }
                    ctx.restore();
                }
            });

            // Solid White Goal Posts Architecture Framework
            ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 8; ctx.lineCap = 'square';
            ctx.beginPath(); ctx.moveTo(netConfig.leftX, netConfig.bottomY); ctx.lineTo(netConfig.leftX, netConfig.topY);
            ctx.lineTo(netConfig.rightX, netConfig.topY); ctx.lineTo(netConfig.rightX, netConfig.bottomY); ctx.stroke();

            // Ball Perspective shadow path track tracking
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)'; ctx.beginPath();
            let shadowSize = Math.max(4, assetsBall.radius - (assetsBall.altY * 0.08));
            ctx.ellipse(assetsBall.x, assetsBall.shadowY, shadowSize * 1.4, shadowSize * 0.7, 0, 0, Math.PI * 2); ctx.fill();

            // RENDER MULTI-JOINTED ARTICULATED RETRO GOALKEEPER
            ctx.save();
            ctx.translate(assetsGoalie.x, assetsGoalie.y);
            
            if (assetsGoalie.pose === 'dive_left') ctx.rotate(Math.PI / 3.2);
            if (assetsGoalie.pose === 'dive_right') ctx.rotate(-Math.PI / 3.2);

            ctx.fillStyle = '#ffff00'; ctx.fillRect(-16, -24, 32, 26);
            ctx.fillStyle = '#000000'; ctx.fillRect(-16, 2, 32, 10);
            ctx.fillStyle = '#ffdbac'; ctx.fillRect(-9, -36, 18, 12);
            ctx.fillStyle = '#4a3728'; ctx.fillRect(-9, -40, 18, 5);

            // Left Arm with expansion offset interpolation
            ctx.save(); ctx.translate(-16, -18);
            if (assetsGoalie.pose === 'dive_left') ctx.rotate(-Math.PI/4);
            ctx.fillStyle = '#ffea00'; ctx.fillRect(-10 - assetsGoalie.limbExtension, -6, 12 + assetsGoalie.limbExtension, 10);
            ctx.fillStyle = '#ffdbac'; ctx.fillRect(-16 - assetsGoalie.limbExtension, -6, 7, 10);
            ctx.restore();

            // Right Arm with expansion offset interpolation
            ctx.save(); ctx.translate(16, -18);
            if (assetsGoalie.pose === 'dive_right') ctx.rotate(Math.PI/4);
            ctx.fillStyle = '#ffea00'; ctx.fillRect(0, -6, 12 + assetsGoalie.limbExtension, 10);
            ctx.fillStyle = '#ffdbac'; ctx.fillRect(8 + assetsGoalie.limbExtension, -6, 7, 10);
            ctx.restore();

            ctx.restore();

            // DRAW STRIKER SPRITE WITH RUN-UP COMPRESSION LEAN
            if (['whistle_wait','quiz_striker','aim_striker','kick_runup'].includes(broadcastLoopState)) {
                ctx.save();
                ctx.translate(assetsStriker.x, assetsStriker.y);
                if (broadcastLoopState === 'kick_runup') ctx.transform(1, 0, -0.15, 1, 0, 0);

                let swingLeg = Math.floor(assetsStriker.frame % 2) === 0 ? 5 : -5;
                ctx.fillStyle = 'var(--ea-crimson)'; ctx.fillRect(-14, -28, 28, 26);
                ctx.fillStyle = '#ffffff'; ctx.fillRect(-14, -2, 28, 8);
                ctx.fillStyle = '#ffdbac'; 
                ctx.fillRect(-9, 6, 6, 10 + swingLeg); 
                ctx.fillRect(3, 6, 6, 10 - swingLeg);
                ctx.fillRect(-7, -39, 14, 11);
                ctx.restore();
            }

            // High-Contrast Classic Retro Leather Soccer Ball Sprite
            ctx.fillStyle = '#ffffff'; ctx.beginPath();
            ctx.arc(assetsBall.x, assetsBall.y - assetsBall.altY, assetsBall.radius, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = '#000000'; ctx.lineWidth = 2.5; ctx.stroke();

            // Geometric panel patterns (Classic hexagon print styling)
            ctx.fillStyle = '#000000';
            let bY = assetsBall.y - assetsBall.altY;
            let r = assetsBall.radius;
            ctx.beginPath(); ctx.arc(assetsBall.x, bY, r * 0.35, 0, Math.PI * 2); ctx.fill();
            
            // Peripheral patch marks mapping for circular tracking realism
            ctx.fillRect(assetsBall.x - r * 0.7, bY - r * 0.5, r * 0.3, r * 0.3);
            ctx.fillRect(assetsBall.x + r * 0.4, bY - r * 0.6, r * 0.3, r * 0.3);
            ctx.fillRect(assetsBall.x - r * 0.5, bY + r * 0.4, r * 0.3, r * 0.3);
            ctx.fillRect(assetsBall.x + r * 0.3, bY + r * 0.4, r * 0.3, r * 0.3);

            dustConfettiPool.forEach(p => { ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, p.sz, p.sz); });

            if (broadcastLoopState === 'play_replay') {
                ctx.fillStyle = 'rgba(4, 9, 23, 0.96)'; ctx.fillRect(60, 190, canvas.width - 120, 120);
                ctx.strokeStyle = 'var(--ea-gold)'; ctx.lineWidth = 3; ctx.strokeRect(60, 190, canvas.width - 120, 120);
                
                ctx.font = '700 24px "Teko"'; ctx.textAlign = 'center';
                ctx.fillStyle = (shotOutcomeMeta.status === 'GOAL') ? 'var(--ea-emerald)' : 'var(--ea-crimson)';
                ctx.fillText(shotOutcomeMeta.description, canvas.width / 2, 230);
                
                ctx.font = '14px "Share Tech Mono"'; ctx.fillStyle = '#a0aec0';
                ctx.fillText(`TACTICAL DATA LOG: ${shotOutcomeMeta.analysis}`, canvas.width / 2, 275);
            }

            if (screenFlashFrames > 0) { ctx.fillStyle = `rgba(255,255,255,${screenFlashFrames / 5})`; ctx.fillRect(0,0,canvas.width,canvas.height); }

            ctx.restore(); requestAnimationFrame(renderCorePipelineFrame);
        }

        function deployConfettiBurst(x, y) {
            dustConfettiPool = []; const pallets = ['#f5a623', '#00e5ff', '#00ff66', '#ff0055', '#ffffff'];
            for (let i = 0; i < 85; i++) {
                dustConfettiPool.push({
                    x: x, y: y, vx: (Math.random() - 0.5) * 12, vy: (Math.random() - 0.85) * 10,
                    color: pallets[Math.floor(Math.random() * pallets.length)], sz: Math.random() * 4 + 2, life: 50 + Math.random() * 35
                });
            }
        }

        function varString(variable, fallback) {
            return getComputedStyle(document.documentElement).getPropertyValue(variable).trim() || fallback;
        }
    </script>
</body>
</html>
